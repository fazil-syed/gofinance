basePath: /
definitions:
  frankfurter.Rate:
    properties:
      base:
        type: string
      date:
        type: string
      quote:
        type: string
      rate:
        type: number
    type: object
  handlers.StockResponse:
    properties:
      currency:
        type: string
      exchange:
        type: string
      price:
        type: number
      symbol:
        type: string
    type: object
info:
  contact: {}
  description: Server to answer Stock related queries
  title: Go Finance Server
  version: "1.0"
paths:
  /forex:
    get:
      description: Fetch forex rates of 165 currencies against a base currency at
        a given day from 1949
      parameters:
      - description: 'Base Currency '
        in: query
        name: base_currency
        type: string
      - description: Date to fetch forex rates at
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/frankfurter.Rate'
            type: array
      security:
      - BasicAuth: []
      summary: Get forex rates of currencies against a base currency at a given day
      tags:
      - Forex
  /price:
    get:
      description: Fetch closing price of a company on any past date
      parameters:
      - description: 'Company Name '
        in: query
        name: company
        type: string
      - description: Date to fetch price at
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.StockResponse'
      security:
      - BasicAuth: []
      summary: Get price of a stock at a given day
      tags:
      - Stock
securityDefinitions:
  BasicAuth:
    type: basic
swagger: "2.0"
